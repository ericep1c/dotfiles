bg = 0, 0, 0, 150
idle = 1, 7, 10, 255
hover = 1, 15, 20, 255
border = 199, 197, 140, 255
ripple = 199, 197, 140, 255
overlay = 0, 0, 0, 100
text = 234, 232, 172, 255

[Settings]
# Width
width = 1400
# Height
height = 760
# The maximum number of wallpapers to load from the directory.
max_wallpapers = 512
# The base size of the square thumbnail images.
base_thumb_size = 150
# The base padding between thumbnails.
base_padding = 15
# The thickness of the glowing border on hover.
border_thickness_bloom = 3.0
